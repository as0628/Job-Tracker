<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Job Tracker</span>
    <div>
      <a href="dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>
      <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
    </div>
  </div>
</nav>

<div class="container mt-4 profile-wrapper">
  <div class="profile-card">

    <h2 class="profile-title">User Profile</h2>

    <form id="profileForm" enctype="multipart/form-data">

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Career Goal</label>
        <input id="career_goal" class="form-select">
      </div>

      <div class="col-md-6 mb-3">
        <label>Target Title</label>
        <input id="target_title" class="form-select">
      </div>

      <div class="col-md-6 mb-3">
        <label>Target Date</label>
        <input type="date" id="target_date" class="form-select">
      </div>

      <div class="col-md-3 mb-3">
        <label>Salary Min</label>
        <input type="number" id="salary_min" class="form-select">
      </div>

      <div class="col-md-3 mb-3">
        <label>Salary Max</label>
        <input type="number" id="salary_max" class="form-select">
      </div>

      <div class="col-md-4 mb-3">
        <label>Currency</label>
        <select id="currency" class="form-select">
          <option value="">Select</option>
          <option value="INR">INR</option>
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
        </select>
      </div>

      <div class="col-md-4 mb-3">
        <label>Current Status</label>
        <select id="current_status" class="form-select">
          <option value="">Select</option>
          <option value="fresher">Fresher</option>
          <option value="experienced">Experienced</option>
        </select>
      </div>

      <div class="col-md-6 mb-3">
        <label>Resume</label>
        <input type="file" id="resume" class="form-select">
        <small id="resumePreview" class="text-muted"></small>
      </div>

      <div class="col-md-6 mb-3">
        <label>Cover Letter (optional)</label>
        <input type="file" id="cover_letter" class="form-select">
      </div>
    </div>

   <button type="submit" class="btn btn-primary save-btn">
  Save Profile
</button>

  </form>
   </div>
</div>
</div>

<script src="js/config.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
