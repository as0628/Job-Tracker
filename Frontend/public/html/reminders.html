<!DOCTYPE html>
<html>
<head>
  <title>Reminders</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Job Tracker</span>
    <div>
      <a href="/html/dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>
      
    </div>
  </div>
</nav>

<div class="container mt-4">

  <h4>Create Reminder</h4>
  <div class="card p-3 mb-4">
    <select id="application_id" class="form-control mb-2"></select>

    <input type="datetime-local" id="reminder_date"
           class="form-control mb-2">

    <input id="message" class="form-control mb-2"
           placeholder="Reminder message">

    <button onclick="createReminder()" class="btn btn-primary">
      Add Reminder
    </button>
  </div>

  <h4>Your Reminders</h4>

<table class="table table-bordered">
  <thead>
    <tr>
      <th>Company Name</th>
      <th>Date</th>
      <th>Message</th>
      <th>Status</th> <!-- ✅ NEW -->
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="reminderTable"></tbody>
</table>


</div>

<script src="/js/config.js"></script>
<script src="/js/reminders.js"></script>
</body>
</html>
