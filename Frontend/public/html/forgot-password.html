<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | Job Tracker</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 100%; max-width: 420px;">
      <h4 class="text-center mb-3">🔐 Forgot Password</h4>
      <p class="text-muted text-center">
        Enter your registered email and we’ll send you a reset link.
      </p>

      <div id="alertBox" class="alert d-none"></div>

      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="you@example.com"
          required
        />
      </div>

      <button class="btn btn-primary w-100" onclick="forgotPassword()">
        Send Reset Link
      </button>

      <div class="text-center mt-3">
        <a href="/html/index.html" class="text-decoration-none">
          ← Back to Login
        </a>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>

  <script>
    async function forgotPassword() {
      const email = document.getElementById("email").value.trim();
      const alertBox = document.getElementById("alertBox");

      if (!email) {
        showAlert("Please enter your email", "danger");
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        showAlert(
          "If this email exists, a reset link has been sent.",
          "success"
        );
      } catch (err) {
        console.error("FORGOT PASSWORD ERROR:", err);
        showAlert("Something went wrong. Try again.", "danger");
      }
    }

    function showAlert(message, type) {
      const alertBox = document.getElementById("alertBox");
      alertBox.className = `alert alert-${type}`;
      alertBox.textContent = message;
      alertBox.classList.remove("d-none");
    }
  </script>

</body>
</html>
