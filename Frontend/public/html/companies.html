<!DOCTYPE html>
<html>
<head>
  <title>Companies</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  />
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Job Tracker</span>
    <div>
      <a href="dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>
      <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- ================= ADD COMPANY ================= -->
  <h4>Add Company</h4>
  <div class="card p-3 mb-4">
    <input id="name" class="form-control mb-2" placeholder="Company Name">
    <input id="industry" class="form-control mb-2" placeholder="Industry">
    <input id="size" class="form-control mb-2" placeholder="Company Size">
    <input id="contact_email" class="form-control mb-2" placeholder="Contact Email">
    <input id="city" class="form-control mb-2" placeholder="City">
    <input id="state" class="form-control mb-2" placeholder="State">
    <textarea id="notes" class="form-control mb-2" placeholder="Notes"></textarea>

    <button onclick="addCompany()" class="btn btn-success">
      Add Company
    </button>
  </div>

  <!-- ================= UPDATE COMPANY (HIDDEN) ================= -->
  <div id="editCompanyCard" class="card p-3 mb-4 d-none">
    <h4>Edit Company</h4>

    <!-- Company name shown but disabled -->
    <input id="editName" class="form-control mb-2" disabled>

    <input id="editIndustry" class="form-control mb-2" placeholder="Industry">
    <input id="editSize" class="form-control mb-2" placeholder="Company Size">
    <input id="editContactEmail" class="form-control mb-2" placeholder="Contact Email">
    <input id="editCity" class="form-control mb-2" placeholder="City">
    <input id="editState" class="form-control mb-2" placeholder="State">
    <textarea id="editNotes" class="form-control mb-2" placeholder="Notes"></textarea>

    <div class="d-flex gap-2">
      <button onclick="updateCompany()" class="btn btn-primary">
        Update
      </button>
      <button onclick="cancelEdit()" class="btn btn-secondary">
        Cancel
      </button>
    </div>
  </div>

  <!-- ================= SEARCH SECTION ================= -->
  
  <h4>Search Companies</h4>
  <div class="card p-3 mb-4">
    <div class="row g-2">
      <div class="col-md-4">
        <input id="searchName" class="form-control" placeholder="Company Name">
      </div>
      <div class="col-md-4">
        <input id="searchCity" class="form-control" placeholder="City">
      </div>
      <div class="col-md-4">
        <input id="searchState" class="form-control" placeholder="State">
      </div>
    </div>

    <button onclick="searchCompanies()" class="btn btn-primary mt-3">
      Search
    </button>
  </div>

  <!-- ================= COMPANY LIST ================= -->
  <h4>Your Companies</h4>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Name</th>
        <th>Industry</th>
        <th>City</th>
        <th>State</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="companyTable"></tbody>
  </table>

</div>

<script src="js/config.js"></script>
<script src="js/companies.js"></script>
</body>
</html>
