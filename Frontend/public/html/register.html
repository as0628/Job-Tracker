<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
  <div class="col-md-4 mx-auto card p-4">
    <h3 class="text-center">Register</h3>

    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">

    <button onclick="register()" class="btn btn-success w-100">Register</button>
  </div>
</div>

<script src="/js/config.js"></script>

<script>
async function register() {
  try {
    const res = await fetch(`${API_BASE_URL}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Registration failed");
      return;
    }

    alert(data.message);
    window.location.href = "/html/index.html";
  } catch (err) {
    alert("Server error. Check backend logs.");
  }
}
</script>

</body>
</html>
