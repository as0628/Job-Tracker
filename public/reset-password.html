<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h4 class="mb-3">Reset Password</h4>

    <input
      type="password"
      id="password"
      class="form-control mb-2"
      placeholder="New Password"
    />

    <input
      type="password"
      id="confirmPassword"
      class="form-control mb-3"
      placeholder="Confirm Password"
    />

    <button onclick="resetPassword()" class="btn btn-primary w-100">
      Reset Password
    </button>

    <div id="msg" class="mt-3 text-center"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get("token");

  async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const msg = document.getElementById("msg");

    if (!password || password.length < 6) {
      msg.innerHTML = "<span class='text-danger'>Password must be at least 6 characters</span>";
      return;
    }

    if (password !== confirm) {
      msg.innerHTML = "<span class='text-danger'>Passwords do not match</span>";
      return;
    }

    const res = await fetch(`${API_BASE_URL}/auth/reset-password/${token}`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ password })
});


    const data = await res.json();

    if (res.ok) {
      msg.innerHTML = "<span class='text-success'>Password reset successful. You can login now.</span>";
      setTimeout(() => {
        window.location.href = "index.html";
      }, 2000);
    } else {
      msg.innerHTML = `<span class='text-danger'>${data.message}</span>`;
    }
  }
</script>

</body>
</html>
